<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Stephni and Matthew Wedding Countdown</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #faf4ea;
      overflow: hidden;
    }

    .countdown-wrapper {
      width: 100%;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #faf4ea;
      box-sizing: border-box;
      padding: 10px;
    }
  </style>
</head>

<body>
  <div class="countdown-wrapper">
    <script src="https://cdn.logwork.com/widget/countdown.js"></script>

    <a
      href="https://logwork.com/countdown-timer"
      class="countdown-timer"
      data-style="circles"
      data-width="595"
      data-timezone="Africa/Johannesburg"
      data-textcolor="#36463e"
      data-date="2027-09-17 17:00"
      data-background="#faf4ea"
      data-digitscolor="#2f5a4d"
      data-unitscolor="#75885b"
    >
      Our Wedding Weekend Begins In…
    </a>
  </div>
</body>
</html>
